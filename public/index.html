<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservaciones Lucy - Grill & Bakery</title>
    <style>
        :root { --azul: #0d1b2a; --oro: #e9c46a; --naranja: #f4a261; --gris: #415a77; --texto: #e0e1dd; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--azul); color: var(--texto); padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: 20px auto; background: #1b263b; padding: 25px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); border: 1px solid #2b3a4f; }
        
        h1 { text-align: center; color: var(--oro); letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { text-align: center; color: var(--naranja); font-size: 0.9em; margin-bottom: 30px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 0.85em; color: var(--oro); margin-bottom: 5px; font-weight: bold; }
        input, textarea, select, .search-bar { background: var(--gris); border: 1px solid #5d6d7e; color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--oro); }

        /* Buscador de Menú */
        .menu-box { background: var(--azul); border-radius: 15px; padding: 15px; border: 1px solid var(--oro); margin-top: 10px; }
        .search-bar { margin-bottom: 15px; border: 1px solid var(--naranja); background: #1b263b; }
        .menu-scroll { max-height: 350px; overflow-y: auto; padding-right: 10px; }
        .cat-title { color: var(--oro); font-size: 0.75em; text-transform: uppercase; display: block; margin: 15px 0 8px; border-bottom: 1px solid var(--gris); padding-bottom: 3px; }
        .item-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #2b3a4f; transition: 0.2s; }
        .item-row:hover { background: rgba(233, 196, 106, 0.05); }
        .item-row input { width: auto; transform: scale(1.3); cursor: pointer; }
        .item-row span { font-size: 0.95em; cursor: pointer; }

        .btn-main { background: var(--oro); color: var(--azul); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1em; transition: 0.3s; width: 100%; margin-top: 20px; }
        .btn-main:hover { background: var(--naranja); transform: translateY(-2px); }
        .btn-pdf { background: #e74c3c; margin-top: 15px; }

        /* Tabs de Gestión */
        .tabs { display: flex; gap: 10px; margin: 30px 0 15px; }
        .tab-btn { flex: 1; background: transparent; border: 1px solid var(--gris); color: var(--texto); padding: 10px; cursor: pointer; border-radius: 10px; }
        .tab-btn.active { background: var(--gris); border-color: var(--oro); color: var(--oro); font-weight: bold; }

        .reserva-card { background: var(--gris); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--oro); position: relative; animation: fadeIn 0.5s; }
        .reserva-card strong { color: var(--oro); font-size: 1.1em; }
        .badge { position: absolute; top: 10px; right: 10px; font-size: 0.7em; padding: 5px 10px; border-radius: 20px; font-weight: bold; }
        .badge-pend { background: #f39c12; color: #1b263b; }
        .badge-serv { background: #2a9d8f; color: white; }
        .btn-done { background: #2a9d8f; color: white; border: none; padding: 8px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>GRILL & BAKERY LUCY</h1>
    <p class="subtitle">Sabor con alma, tradición que une</p>
    
    <form id="reservaForm">
        <div class="form-grid">
            <div class="full-width">
                <label>Nombre del Cliente</label>
                <input type="text" id="nombre" required placeholder="Ej: Christopher Picón">
            </div>
            <div>
                <label>Fecha</label>
                <input type="date" id="fecha" required>
            </div>
            <div>
                <label>Hora</label>
                <input type="time" id="hora" required>
            </div>
            <div class="full-width">
                <label>Número de Personas</label>
                <input type="number" id="personas" required min="1" placeholder="¿Cuántos vienen?">
            </div>
        </div>

        <label style="margin-top: 20px;">Arma tu Pedido (Opcional)</label>
        <div class="menu-box">
            <input type="text" class="search-bar" id="menuSearch" placeholder="🔍 Buscar plato (ej: tomahawk, chuzo, sangría...)">
            <div class="menu-scroll" id="menuLista">
                </div>
        </div>

        <label style="margin-top: 20px;">Notas Especiales</label>
        <textarea id="nota" rows="2" placeholder="Cumpleaños, alergias, mesa en terraza..."></textarea>
        
        <button type="submit" class="btn-main">CONFIRMAR RESERVACIÓN</button>
    </form>

    <button id="btnExportar" class="btn-main btn-pdf">📥 DESCARGAR HOJA DE RUTA (PDF)</button>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarVista('pendientes')">Pendientes</button>
        <button class="tab-btn" onclick="cambiarVista('todas')">Historial Completo</button>
    </div>

    <div id="listaContainer"></div>
</div>

<script>
    const CARTA = {
        "ESPECIALIDADES": ["Chuzo Tradicional Lucy", "Chuzo Mar y Tierra", "Chuzo de Mariscos", "Chuzo de Cuy de la Abuela"],
        "PARRILLA": ["plato de tomahawk", "Bife de Chorizo Lucy", "Ribeye Steak", "Cowboy de Cerdo", "Matambre de Cerdo", "Lucy Steak", "Lomo a lo Pobre", "Churrasco", "Lomo Saltado", "Suprema de Pollo", "Costilla de Cerdo", "Cuencano Tradicional Lucy"],
        "SOPAS Y CALDOS": ["Locro de Papas", "Caldo de Gallina Criolla", "Caldo Tradicional de Patas", "Salchipapa", "Papi Pollo"],
        "CEVICHES Y MAR": ["Ceviche de Pescado", "Ceviche de Camarón", "Ceviche Marinero", "Ceviche Mixto", "Jalea de Mariscos", "Trilogía de Mariscos", "Langostinos Lucy"],
        "TEX MEX": ["Tacos Lucy", "Burrito Lucy", "Quesadilla Lucy", "Nachos con Chilli", "Fajitas Nachos"],
        "HAMBURGUESAS": ["Hamburguesa Lucy", "Hamburguesa BBQ Texas", "Hamburguesa Funghi", "Hamburguesa Hawaiana", "Hamburguesa Clásica", "Alitas de Pollo", "Chicken Fingers"],
        "BEBIDAS": ["Cerveza Spiega Blonde", "Cerveza Irish Red", "Cerveza Sweet Stout", "Cerveza Honey Ale", "Canelazo Tradicional", "Sangría Jarra", "Vino Hervido", "Limonada Hierba Buena", "Chicha Morada", "Horchata", "Jugo Natural"],
        "POSTRES": ["Torta de Chocolate", "Torta Tres Leches", "Suspiros Rellenos", "Banana Split", "Smoothie Mango Maracuyá"]
    };

    let vistaActual = 'pendientes';

    function renderMenu(filtro = "") {
        const container = document.getElementById('menuLista');
        container.innerHTML = `<label class="item-row"><input type="checkbox" value="Decidir en mesa" checked> <span>🍽️ Decidir en el restaurante</span></label>`;
        
        for (const [cat, platos] of Object.entries(CARTA)) {
            const platosFiltrados = platos.filter(p => p.toLowerCase().includes(filtro.toLowerCase()));
            if (platosFiltrados.length > 0) {
                const span = document.createElement('span');
                span.className = 'cat-title';
                span.innerText = cat;
                container.appendChild(span);
                
                platosFiltrados.forEach(p => {
                    const label = document.createElement('label');
                    label.className = 'item-row';
                    label.innerHTML = `<input type="checkbox" value="${p}" class="plato-check"> <span>${p}</span>`;
                    container.appendChild(label);
                });
            }
        }
    }

    document.getElementById('menuSearch').addEventListener('input', (e) => renderMenu(e.target.value));

    async function cargar() {
        const res = await fetch('/api/reservaciones');
        const data = await res.json();
        const ordenadas = data.sort((a,b) => a.fecha.localeCompare(b.fecha) || a.hora.localeCompare(b.hora));
        const filtradas = vistaActual === 'pendientes' ? ordenadas.filter(r => r.estado !== 'completada') : ordenadas;

        const cont = document.getElementById('listaContainer');
        cont.innerHTML = filtradas.length ? '' : '<p style="text-align:center; opacity:0.5;">No hay registros.</p>';
        
        filtradas.forEach(r => {
            const div = document.createElement('div');
            div.className = 'reserva-card';
            const badge = r.estado === 'completada' ? '<span class="badge badge-serv">SERVIDA</span>' : '<span class="badge badge-pend">PENDIENTE</span>';
            div.innerHTML = `
                ${badge}
                <strong>${r.fecha} | ${r.hora}</strong><br>
                <span style="font-size:1.1em;">👤 ${r.nombre}</span> <small>(${r.personas} pers.)</small>
                <div style="color:var(--naranja); margin:10px 0; font-size:0.9em;">🍴 ${r.pedido}</div>
                <div style="font-size:0.8em; color:#bdc3c7;">Note: ${r.nota || 'Sin notas'}</div>
                ${r.estado === 'pendiente' ? `<button onclick="servir(${r.id})" class="btn-done">MARCAR COMO SERVIDA ✅</button>` : ''}
            `;
            cont.appendChild(div);
        });
    }

    function cambiarVista(v) {
        vistaActual = v;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(v)));
        cargar();
    }

    window.servir = async (id) => {
        if(confirm('¿Confirmas que la mesa ha sido servida?')) {
            await fetch(`/api/reservaciones/${id}/completar`, { method: 'PUT' });
            cargar();
        }
    };

    document.getElementById('reservaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const seleccionados = Array.from(document.querySelectorAll('.plato-check:checked')).map(i => i.value);
        if(document.querySelector('input[value="Decidir en mesa"]').checked && seleccionados.length === 0) seleccionados.push("Decidir en mesa");
        
        const b = {
            nombre: document.getElementById('nombre').value,
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('hora').value,
            personas: document.getElementById('personas').value,
            pedido: seleccionados.join(', '),
            nota: document.getElementById('nota').value
        };
        await fetch('/api/reservaciones', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(b) });
        document.getElementById('reservaForm').reset();
        renderMenu();
        cargar();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    document.getElementById('btnExportar').addEventListener('click', () => window.open('/api/exportar-pdf', '_blank'));
    
    renderMenu();
    cargar();
</script>

</body>
</html>
